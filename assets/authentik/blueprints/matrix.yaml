version: 1
metadata:
  name: Matrix Synapse OIDC application
entries:
  # Group of users allowed to sign in to the Matrix homeserver. The
  # primary user is added automatically; add others via the admin UI
  # if you ever want to allow additional accounts.
  - model: authentik_core.group
    identifiers:
      name: matrix
    attrs:
      users:
        - !Find [authentik_core.user, [username, !Env AK_BP_USER_USERNAME]]
  - model: authentik_providers_oauth2.oauth2provider
    id: matrix-provider
    identifiers:
      name: matrix
    attrs:
      client_type: confidential
      client_id: !Env AK_BP_MATRIX_CLIENT_ID
      client_secret: !Env AK_BP_MATRIX_CLIENT_SECRET
      redirect_uris:
        - matching_mode: strict
          url: !Env AK_BP_MATRIX_REDIRECT_URI
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
  - model: authentik_core.application
    identifiers:
      slug: matrix
    attrs:
      name: Matrix
      provider: !KeyOf matrix-provider
      policy_engine_mode: any
      open_in_new_tab: true
  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, matrix]]
      group: !Find [authentik_core.group, [name, matrix]]
    attrs:
      order: 0
