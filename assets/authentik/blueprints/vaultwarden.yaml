version: 1
metadata:
  name: Vaultwarden OIDC application
# No group / policybinding: any authenticated Authentik user can SSO into
# Vaultwarden. Combined with SSO_ONLY=true on the Vaultwarden side, this
# means only Authentik-authenticated users can sign up or log in.
entries:
  # Custom email scope mapping. Authentik's default `email` scope returns
  # only `email` (no `email_verified`), so Vaultwarden's SSO middleware
  # treats the verification claim as missing and rejects logins. This
  # mapping replaces the default `email` for the Vaultwarden provider,
  # adding `email_verified` sourced from `user.attributes.email_verified`
  # (which user.yaml seeds to `true`).
  - model: authentik_providers_oauth2.scopemapping
    id: vaultwarden-email-scope
    identifiers:
      managed: openclaw-vaultwarden-email-scope
    attrs:
      name: "OpenClaw Vaultwarden: email + email_verified"
      scope_name: email
      expression: |
        return {
            "email": request.user.email,
            "email_verified": request.user.attributes.get("email_verified", False),
        }
  - model: authentik_providers_oauth2.oauth2provider
    id: vaultwarden-provider
    identifiers:
      name: vaultwarden
    attrs:
      client_type: confidential
      client_id: !Env AK_BP_VAULTWARDEN_CLIENT_ID
      client_secret: !Env AK_BP_VAULTWARDEN_CLIENT_SECRET
      redirect_uris:
        - matching_mode: strict
          url: !Env AK_BP_VAULTWARDEN_REDIRECT_URI
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !KeyOf vaultwarden-email-scope
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
  - model: authentik_core.application
    identifiers:
      slug: vaultwarden
    attrs:
      name: Vaultwarden
      provider: !KeyOf vaultwarden-provider
      policy_engine_mode: any
      open_in_new_tab: true
