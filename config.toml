[foundation]
root_domain = "chiiiirs.com"

[webfinger]
subject = "acct:tailscale@chiiiirs.com"
oidc_issuer_url = "https://auth.chiiiirs.com/application/o/tailscale/"

[authentik]
subdomain = "auth"
image_version = "2026.2"

[authentik.db]
name = "authentik"
instance_type = "t4g.small"
allocated_storage_gib = 20

[authentik.server]
cpu = 1024
memory_limit_mib = 2048
desired_count = 1
min_healthy_percent = 100

[authentik.worker]
cpu = 1024
memory_limit_mib = 2048
desired_count = 1
min_healthy_percent = 100

[authentik.smtp]
host = "smtp.chiiiirs.com"
port = 587
use_ssl = false
use_tls = true
from_email_address = "authentik@chiiiirs.com"
