[foundation]
# Used as the brand string for AWS resource names (e.g. the shared
# BackupVault is `<project_name>-backups`). Decoupled from the repo
# name on purpose so forks can pick different identifiers.
project_name = "chiiiirs"
public_domain = "chiiiirs.com"
private_domain = "chiiiirs.net"

[data]
master_secret_name = "data/database"

[data.instance]
instance_type = "t4g.small"
allocated_storage_gib = 20

[webfinger]
subject = "acct:chris@chiiiirs.com"
oidc_issuer_application = "tailscale"

[authentik]
subdomain = "auth"
image_version = "2026.2"

[authentik.db]
name = "authentik"
secret_name = "authentik/database"

[authentik.server]
cpu = 1024
memory_limit_mib = 2048

[authentik.worker]
cpu = 1024
memory_limit_mib = 2048

[authentik.smtp]
host = "smtp.chiiiirs.com"
port = 587
from_email_address = "authentik@chiiiirs.com"

[authentik.user]
username = "chris"
display_name = "Chris"

[headscale]
headscale_subdomain = "headscale"
headplane_subdomain = "headplane"
dns_subdomain = "ts"
headscale_image_version = "0.26.1"
headplane_image_version = "0.6.1"
oidc_issuer_application = "headscale"
dns_nameservers = ["1.1.1.1", "9.9.9.9"]
log_level = "info"

[headscale.db]
name = "headscale"
secret_name = "headscale/database"

[headscale.headscale]
cpu = 512
memory_limit_mib = 1024

[headscale.headplane]
cpu = 512
memory_limit_mib = 1024

[headscale.exit_node]
instance_type = "t3.micro"
tailscale_image_version = "stable"
hostname = "aws-exit"
preauthkey_user = "infra"

[vaultwarden]
subdomain = "vaultwarden"
image_version = "1.35.8"

[vaultwarden.db]
name = "vaultwarden"
secret_name = "vaultwarden/database"

[vaultwarden.task]
cpu = 512
memory_limit_mib = 1024

[vaultwarden.smtp]
host = "smtp.chiiiirs.com"
port = 587
from_email_address = "vaultwarden@chiiiirs.com"

[mail]
subdomain = "smtp"
postmaster_address = "postmaster@chiiiirs.com"
image_version = "14.0.0"
enable_smtps = true
enable_clamav = true
users = ["chris"]

[mail.task]
cpu = 1024
memory_limit_mib = 2048
desired_count = 1
min_healthy_percent = 0

[mail.relay]
port = 587
iam_user_name = "chiiiirs-dot-com-mail-ses"
secret_name = "mail/ses-relay"
# `host` is intentionally omitted; MailStack derives it from Aws.REGION
# as f"email-smtp.{Aws.REGION}.amazonaws.com" so it tracks the deploy
# region without manual config drift.

[site]
# Static landing page at chiiiirs.com. CloudFront forwards
# /.well-known/webfinger* to WebFingerStack's API so OIDC discovery
# keeps working at the apex; everything else is served from S3.
www_subdomain = "www"

[webmail]
# Roundcube webmail at mail.<public_domain>. ALB enforces Authentik
# OIDC; users then enter their IMAP password to sign in to Roundcube.
# Auto-login (single-step SSO) is a future follow-up - it requires
# either a Dovecot master-user shim with a custom Roundcube plugin or
# end-to-end OAUTHBEARER between Roundcube and Dovecot.
subdomain = "mail"
image_version = "1.6.10-apache"

[webmail.task]
cpu = 256
memory_limit_mib = 512
desired_count = 1
min_healthy_percent = 0

[matrix]
# Self-hosted Matrix Synapse homeserver. Federates publicly with the
# rest of Matrix; OIDC SSO via Authentik. server_name is the apex
# (chiiiirs.com) so MXIDs look like `@chris:chiiiirs.com`; the actual
# Synapse listener lives at matrix.<public_domain>, advertised via
# `.well-known/matrix/server` from SiteStack.
subdomain = "matrix"
image_version = "v1.152.1"
remote_media_lifetime = "90d"

[matrix.task]
cpu = 1024
memory_limit_mib = 2048
desired_count = 1
min_healthy_percent = 0

[matrix.db]
name = "matrix"
secret_name = "matrix/database"
# Synapse refuses to start unless the database was created with C
# locale + template0. The rds_logical_databases Lambda picks these up.
collation = "C"
ctype = "C"
template = "template0"
